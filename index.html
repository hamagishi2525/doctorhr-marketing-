<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoctorHR Marketing Platform | Tobe-Ru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand:        #16a34a;
        --brand-dark:   #15803d;
        --brand-mid:    #4ade80;
        --brand-light:  #f0fdf4;
        --brand-border: #bbf7d0;
        --color-text-primary:        #111827;
        --color-text-secondary:      #6b7280;
        --color-background-primary:  #ffffff;
        --color-background-secondary:#f8fafb;
        --color-border-tertiary:     rgba(0,0,0,0.08);
        --color-border-secondary:    rgba(0,0,0,0.14);
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --border-radius-lg: 12px;
        --border-radius-md: 8px;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 14px; }
      body {
        font-family: var(--font-sans);
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      /* Global input/select styles */
      select, input, textarea, button {
        font-family: var(--font-sans);
      }
      select, input[type=number], input[type=text], input[type=date] {
        background: var(--color-background-secondary);
        border: 1px solid var(--color-border-secondary);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
        color: var(--color-text-primary);
        outline: none;
        transition: border-color 0.15s;
      }
      select:focus, input:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
      }
      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
    <script type="module" crossorigin src="/doctorhr-marketing-/assets/index--lzEvNU6.js"></script>
  </head>
